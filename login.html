<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThriftTrack - Access Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
  </head>
  <body
    class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="bg-white w-full max-w-md rounded-2xl p-8 shadow-xl border border-slate-100 space-y-6"
    >
      <div class="text-center space-y-2">
        <div
          class="w-12 h-12 bg-indigo-600 rounded-xl mx-auto flex items-center justify-center text-white font-bold text-2xl shadow-md shadow-indigo-600/20"
        >
          T
        </div>
        <h2 class="text-xl font-bold text-slate-900 tracking-tight">
          Welcome to ThriftTrack
        </h2>
        <p class="text-xs text-slate-400">
          Enter your credentials to manage your store catalog and streams.
        </p>
      </div>

      <div
        id="auth-alert"
        class="hidden text-xs font-semibold p-3 rounded-lg text-center"
      ></div>

      <form
        id="login-form"
        class="space-y-4"
        onsubmit="handleAuthSubmit(event)"
      >
        <div>
          <label
            class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1"
            >Workspace Email Address</label
          >
          <input
            type="email"
            id="auth-email"
            required
            placeholder="admin@thrifttrack.com"
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition placeholder-slate-300"
          />
        </div>

        <div>
          <label
            class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1"
            >Secure Password</label
          >
          <div class="relative">
            <input
              type="password"
              id="auth-password"
              required
              placeholder="••••••••"
              class="w-full border border-slate-200 rounded-xl pl-4 pr-12 py-3 text-sm focus:outline-none focus:border-indigo-500 transition placeholder-slate-300"
            />
            <button
              type="button"
              onclick="togglePasswordReveal()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 text-xs font-bold select-none px-2 py-1 transition z-10"
            >
              <span id="reveal-text">Show</span>
            </button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3 pt-2">
          <button
            type="submit"
            id="btn-login"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm py-3 rounded-xl shadow-md shadow-indigo-600/10 transition"
          >
            Sign In
          </button>
          <button
            type="button"
            onclick="handleRegister()"
            id="btn-register"
            class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold text-sm py-3 rounded-xl transition"
          >
            Create Account
          </button>
        </div>
      </form>
    </div>

    <script>
      const SUPABASE_URL = window.ENV_SUPABASE_URL || '';
      const SUPABASE_ANON_KEY = window.ENV_SUPABASE_ANON_KEY || '';

      let supabaseClient = null;

      // Run safe engine initialization sequence
      document.addEventListener('DOMContentLoaded', async () => {
        try {
          if (
            window.supabase &&
            typeof window.supabase.createClient === 'function'
          ) {
            supabaseClient = window.supabase.createClient(
              SUPABASE_URL,
              SUPABASE_ANON_KEY
            );
          } else {
            showAlert(
              '⚠️ CDN Error: Unable to access the Supabase library wrapper. Check your internet connection.',
              'error'
            );
            return;
          }

          // Auto-forward instantly if a persistent session is alive
          const {
            data: { session },
          } = await supabaseClient.auth.getSession();
          if (session) {
            window.location.href = 'index.html';
          }
        } catch (err) {
          showAlert('Initialization crash: ' + err.message, 'error');
        }
      });

      // PASSWORD REVEAL TOGGLE
      function togglePasswordReveal() {
        const passwordInput = document.getElementById('auth-password');
        const revealText = document.getElementById('reveal-text');

        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          revealText.textContent = 'Hide';
        } else {
          passwordInput.type = 'password';
          revealText.textContent = 'Show';
        }
      }

      // Process Workspace Login Identity
      async function handleAuthSubmit(event) {
        event.preventDefault();
        if (!supabaseClient) {
          showAlert('Authentication client is offline.', 'error');
          return;
        }

        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        showAlert('Authenticating workspace session...', 'info');

        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email,
            password,
          });
          if (error) {
            showAlert(error.message, 'error');
          } else {
            showAlert('Access Granted! Syncing data streams...', 'success');
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 1000);
          }
        } catch (err) {
          showAlert(err.message, 'error');
        }
      }

      // Process New Account Setup
      async function handleRegister() {
        if (!supabaseClient) {
          showAlert('Authentication client is offline.', 'error');
          return;
        }

        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;

        if (!email || !password) {
          showAlert(
            'Please fill in both fields to create an account.',
            'error'
          );
          return;
        }

        showAlert('Registering new workspace profile...', 'info');

        try {
          const { data, error } = await supabaseClient.auth.signUp({
            email,
            password,
          });
          if (error) {
            showAlert(error.message, 'error');
          } else {
            showAlert(
              'Registration complete! Workspace initialized.',
              'success'
            );
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 1500);
          }
        } catch (err) {
          showAlert(err.message, 'error');
        }
      }

      // Feedback Alert Banner Helper
      function showAlert(message, type) {
        const alertBox = document.getElementById('auth-alert');
        alertBox.className =
          'text-xs font-semibold p-3 rounded-lg text-center block ';

        if (type === 'error') {
          alertBox.className += 'bg-red-50 text-red-600 border border-red-100';
        } else if (type === 'success') {
          alertBox.className +=
            'bg-emerald-50 text-emerald-600 border border-emerald-100';
        } else {
          alertBox.className +=
            'bg-indigo-50 text-indigo-600 border border-indigo-100';
        }
        alertBox.textContent = message;
      }
    </script>
  </body>
</html>
